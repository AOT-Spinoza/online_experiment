<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrow of Time experiment</title>
    <!-- Bundled jsPsych core CSS (emitted by esbuild from a CSS import in main.js). -->
    <link rel="stylesheet" href="./experiment.bundle.css" />
    <!-- Project-specific overrides on top of jsPsych defaults. -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      jatos.js is provided automatically by the JATOS server when this
      study is served via /publix/<id>/start — it appears alongside our
      other static assets and the relative `jatos.js` resolves to it.
      When the bundle is served from anywhere else (esbuild dev server,
      GitHub Pages, etc.) this file simply 404s; window.jatos stays
      undefined and main.js falls back to the DataPipe + Prolific
      redirect path. A single 404 in the local-dev console is the
      cosmetic cost of keeping one bundle for both deployments.
    -->
    <script src="jatos.js"></script>
    <script type="module" src="./experiment.bundle.js"></script>
  </body>
</html>
